<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>红楼梦 · 知识探索工具</title>
  <meta name="description" content="红楼梦知识探索工具：关系图谱、家族谱系、人物名录与诗词典故知识库，边读边查。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">
  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Non-blocking font load with display=swap to avoid FOIT -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Noto+Serif+Traditional+Chinese:wght@400;600;700;900&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Noto+Serif+Traditional+Chinese:wght@400;600;700;900&display=swap"></noscript>
  <link rel="stylesheet" href="css/style.css?v=20260403a">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-title">红楼梦</div>
    <div class="loading-subtitle">正在整理人物脉络与关系线索……</div>
    <div class="loading-spinner"></div>
  </div>

  <header class="header">
    <div class="header-left">
      <button id="sidebar-toggle" class="btn-sidebar-toggle" aria-label="切换侧边栏">☰</button>
      <div>
        <div class="header-title">红楼梦 · 知识探索工具</div>
        <div class="header-subtitle">图谱 · 族谱 · 名录 · 知识库</div>
      </div>
    </div>

    <div class="header-center">
      <nav class="view-nav" id="view-nav" role="tablist" aria-label="视图切换">
        <button class="view-nav-tab active" data-view="graph" role="tab" aria-selected="true" aria-controls="view-graph"><span class="view-nav-icon">◉</span><span class="view-nav-label">关系图谱</span></button>
        <button class="view-nav-tab" data-view="tree" role="tab" aria-selected="false" aria-controls="view-tree"><span class="view-nav-icon">🌳</span><span class="view-nav-label">家族谱系</span></button>
        <button class="view-nav-tab" data-view="list" role="tab" aria-selected="false" aria-controls="view-list"><span class="view-nav-icon">📋</span><span class="view-nav-label">人物名录</span></button>
        <button class="view-nav-tab" data-view="knowledge" role="tab" aria-selected="false" aria-controls="view-knowledge"><span class="view-nav-icon">📖</span><span class="view-nav-label">知识库</span></button>
      </nav>
    </div>

    <div class="header-right" id="header-right">
      <!-- Theme & font controls injected here by JS -->
    </div>
  </header>

  <section class="global-context-bar" id="global-context-bar" aria-label="当前探索上下文">
    <div class="context-breadcrumbs" id="context-breadcrumbs"></div>
    <div class="context-facets" id="context-facets"></div>
    <div class="context-actions">
      <button id="btn-clear-context" class="text-action">清空上下文</button>
    </div>
  </section>

  <div class="main-container">
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <aside id="sidebar" class="sidebar">
      <section class="sidebar-section sidebar-priority-block">
        <div class="sidebar-section-title">推荐人物</div>
        <div id="featured-characters" class="quick-grid"></div>
      </section>

      <section class="sidebar-section sidebar-priority-block">
        <div class="sidebar-section-title">专题入口</div>
        <div id="topic-list" class="topic-list"></div>
      </section>

      <section class="sidebar-section sidebar-priority-block">
        <div class="sidebar-section-title">阅读阶段</div>
        <div id="stage-list" class="topic-list"></div>
      </section>

      <details class="sidebar-section sidebar-more-tools">
        <summary class="sidebar-more-summary">筛选与比较</summary>

        <div class="sidebar-more-content">
          <section class="sidebar-subsection">
            <div class="sidebar-section-title">家族筛选</div>
            <div id="family-filters" class="family-filter"></div>
          </section>

          <section class="sidebar-subsection">
            <div class="sidebar-section-title">关系类型</div>
            <div id="relation-filters" class="relation-filter"></div>
          </section>

          <section class="sidebar-subsection sidebar-filter-summary" id="graph-filter-summary" aria-live="polite"></section>

          <section class="sidebar-subsection">
            <div class="sidebar-section-title">人物对比</div>
            <div class="compare-inputs compare-inputs-sidebar">
              <select id="compare-left"></select>
              <span class="compare-sep">↔</span>
              <select id="compare-right"></select>
              <button id="btn-run-compare" class="secondary-action">查看关系</button>
            </div>
            <button id="btn-compare-current" class="text-action sidebar-compare-current">用当前人物发起对比</button>
          </section>

          <section class="sidebar-subsection compact-legend">
            <div class="sidebar-section-title">图例</div>
            <div class="legend-section">
              <div class="legend-item"><div class="legend-line" style="background:#4A90D9"></div><span>血缘</span></div>
              <div class="legend-item"><div class="legend-line" style="background:#E74C3C"></div><span>婚姻</span></div>
              <div class="legend-item"><div class="legend-line" style="background:#95A5A6"></div><span>主仆</span></div>
              <div class="legend-item"><div class="legend-line legend-dashed" style="border-color:#E91E8C"></div><span>情感</span></div>
              <div class="legend-item"><div class="legend-line legend-dashed" style="border-color:#F39C12"></div><span>社交</span></div>
              <div class="legend-item"><div class="legend-line legend-dotted" style="border-color:#8E44AD"></div><span>敌对</span></div>
            </div>
          </section>

          <section class="sidebar-subsection">
            <div class="sidebar-section-title">统计</div>
            <div id="stats-section" class="stats-section"></div>
          </section>
        </div>
      </details>

      <div id="sidebar-search-results" class="sidebar-search-results"></div>
    </aside>

    <div id="sidebar-resize-handle" class="sidebar-resize-handle" aria-hidden="true"></div>

    <main class="content-area">
      <!-- Graph View (default) -->
      <section class="graph-stage view-panel active" id="view-graph" role="tabpanel" aria-label="关系图谱">
        <div id="graph-container" class="graph-container">
          <div id="mode-indicator" class="mode-indicator">
            <span id="mode-name">聚焦模式</span>
            <button id="btn-exit-focus" class="exit-btn">退出聚焦</button>
          </div>

          <div class="controls-panel">
            <button id="btn-zoom-in" class="control-btn" title="放大">＋</button>
            <button id="btn-zoom-out" class="control-btn" title="缩小">－</button>
            <button id="btn-reset" class="control-btn" title="重置视图">⟲</button>
            <button id="btn-toggle-labels" class="control-btn active" title="切换标签">字</button>
            <button id="btn-graph-fullscreen" class="control-btn" title="大图模式">⛶</button>
          </div>

          <div id="graph-floating-bar" class="graph-floating-bar">
            <div class="graph-search-area">
              <div class="graph-search-box">
                <span class="graph-search-icon">🔍</span>
                <input
                  id="graph-search-input"
                  class="graph-search-input"
                  type="text"
                  placeholder="搜索人物、关系或主题"
                  autocomplete="off"
                  aria-label="搜索人物、关系或主题"
                  role="searchbox"
                >
                <div id="graph-search-results" class="graph-search-results"></div>
              </div>
              <button id="btn-back" class="graph-action-btn hidden" title="返回上一视图">← 返回</button>
              <button id="btn-full-view" class="graph-action-btn" title="回到完整图谱">全图</button>
            </div>
            <div class="graph-floating-info">
              <div id="fullscreen-view-label" class="graph-floating-label">默认概览</div>
            </div>
            <div class="graph-floating-actions">
              <button id="btn-exit-fullscreen" class="control-btn hidden" title="退出大图模式">✕</button>
            </div>
          </div>
        </div>

        <aside id="detail-drawer" class="detail-drawer">
          <div class="detail-drawer-header">
            <div>
              <div class="drawer-eyebrow">当前视图</div>
              <div class="detail-drawer-title">关系摘要</div>
            </div>
            <button id="drawer-close" class="drawer-close" aria-label="关闭详情">✕</button>
          </div>
          <div id="drawer-content" class="detail-drawer-content"></div>
        </aside>
      </section>

      <!-- Tree View -->
      <section class="view-panel" id="view-tree" role="tabpanel" aria-label="家族谱系">
        <div id="tree-container" class="tree-container"></div>
      </section>

      <!-- List View -->
      <section class="view-panel" id="view-list" role="tabpanel" aria-label="人物名录">
        <div id="list-container" class="list-container"></div>
      </section>

      <!-- Knowledge View -->
      <section class="view-panel" id="view-knowledge" role="tabpanel" aria-label="知识库">
        <div id="knowledge-container" class="knowledge-container"></div>
      </section>
    </main>
  </div>

<div id="character-card-overlay" class="character-card-overlay">
    <div id="card-content" class="character-card"></div>
  </div>

  <script src="js/facet-store.js?v=20250916e"></script>
  <script src="js/graph.js?v=20250916e"></script>
  <script src="js/tree-view.js?v=20250916e"></script>
  <script src="js/list-view.js?v=20250916e"></script>
  <script src="js/knowledge-view.js?v=20250916e"></script>
  <script src="js/app.js?v=20250916e"></script>
</body>
</html>
